lidar_detection_node:
  ros__parameters:
    # Backend: "traditional" or "dl"
    detector_type: "traditional"

    # Topic names
    input_topic:  "/hesai/pandar"           # Hesai 128-line LiDAR raw point cloud
    output_topic: "/perception/lidar/cones" # ConeArray output

    # --- Traditional detector parameters ---

    # Ground removal
    # The simulator ground is centered at z=-1.0 m in the lidar frame.
    # RANSAC with a 0.2 m inlier band also removes most points from a 0.3 m
    # cone, leaving a cluster that fails min_cone_height.  A known-height
    # cutoff keeps the cone body while rejecting simulated ground returns.
    use_ransac: false
    ground_z_threshold: -0.95       # m, keep points above this height
    ransac_distance_threshold: 0.2  # m

    # Voxel downsampling
    voxel_leaf_size: 0.1            # m

    # Euclidean clustering
    cluster_tolerance: 0.4          # m
    min_cluster_size: 3
    max_cluster_size: 200

    # Cone shape filter
    max_cone_width: 0.5             # m
    max_cone_height: 0.6            # m
    min_cone_height: 0.1            # m

    # Detection range
    max_detection_range: 20.0       # m

    # --- DL detector parameters (used when detector_type: "dl") ---
    # model_path: "/path/to/model.bin"
